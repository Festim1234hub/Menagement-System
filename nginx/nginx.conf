events {}

http {
  upstream frontend_upstream {
    server frontend:5173;
  }
  upstream auth_upstream {
    server auth-service:3001;
  }
  upstream project_upstream {
    server project-service:3002;
  }
  upstream task_upstream {
    server task-service:3003;
  }
  upstream notification_upstream {
    server notification-service:3004;
  }

  server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/auth {
      proxy_pass http://auth_upstream/api/auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/projects {
      rewrite ^/api/projects(/?.*) /projects$1 break;
      proxy_pass http://project_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/tasks {
      rewrite ^/api/tasks(/?.*) /tasks$1 break;
      proxy_pass http://task_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/notifications/stream {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass http://notification_upstream/api/notifications/stream;
    }

    location /api/notifications {
      proxy_pass http://notification_upstream/api/notifications;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
