events {}

http {
  server {
    listen 80;
    server_name _;
    resolver 127.0.0.11 valid=5s ipv6=off;

    location /api/auth {
      set $upstream http://auth-service:3001;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/projects {
      set $upstream http://project-service:3002;
      rewrite ^/api/projects(/?.*) /projects$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/tasks {
      set $upstream http://task-service:3003;
      rewrite ^/api/tasks(/?.*) /tasks$1 break;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header Authorization $http_authorization;
    }

    location /api/notifications/stream {
      set $upstream http://notification-service:3004;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_pass $upstream;
    }

    location /api/notifications {
      set $upstream http://notification-service:3004;
      proxy_pass $upstream;
      proxy_set_header Host $host;
    }

    location / {
      set $upstream http://frontend:5173;
      proxy_pass $upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
