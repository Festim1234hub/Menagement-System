events {}

http {
  upstream frontend_upstream {
    server frontend:5173;
  }
  upstream auth_upstream {
    server auth-service:3001;
  }
  upstream project_upstream {
    server project-service:3002;
  }
  upstream task_upstream {
    server task-service:3003;
  }
  upstream notification_upstream {
    server notification-service:3004;
  }

  server {
    listen 80;
    server_name _;

    location / {
      proxy_pass http://frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
      proxy_pass http://auth_upstream/api/auth/;
    }

    location /api/projects/ {
      proxy_pass http://projects_upstream/projects/;
    }
  
    location /tasks/ {
      proxy_pass http://task_upstream/tasks/;
    }

    location /api/notifications/stream {
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_buffering off;
      chunked_transfer_encoding off;
      proxy_pass http://notification_upstream/api/notifications/stream;
    }

    location /api/notifications/ {
      proxy_pass http://notification_upstream/api/notifications/;
    }
  }
}
